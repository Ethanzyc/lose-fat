<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>减脂数据仪表盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display","Microsoft YaHei",sans-serif;background:#F2F2F7;color:#1a1a1a;line-height:1.6;-webkit-font-smoothing:antialiased}
.container{max-width:880px;margin:0 auto;padding:20px 16px}

header{background:linear-gradient(135deg,#4F8EF7,#34C759);color:#fff;padding:28px;border-radius:20px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:0 4px 20px rgba(79,142,247,.2)}
header h1{font-size:22px;font-weight:700;letter-spacing:.3px}
header .subtitle{font-size:13px;opacity:.85;margin-top:2px}
header select{padding:10px 16px;border-radius:12px;border:none;font-size:14px;min-width:200px;cursor:pointer;background:rgba(255,255,255,.95);color:#333;box-shadow:0 2px 8px rgba(0,0,0,.1);font-weight:500}

.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
@media(min-width:600px){.cards{grid-template-columns:repeat(4,1fr)}}
.card{background:#fff;border-radius:16px;padding:20px 16px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.1)}
.card .label{font-size:11px;color:#8E8E93;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.card .value{font-size:28px;font-weight:800;line-height:1.2;letter-spacing:-.5px}
.card .meta{font-size:12px;color:#8E8E93;margin-top:6px}

.green{color:#34C759}.amber{color:#FF9500}.red{color:#FF3B30}.blue{color:#4F8EF7}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bg{background:rgba(52,199,89,.12);color:#34C759}
.ba{background:rgba(255,149,0,.12);color:#FF9500}
.br{background:rgba(255,59,48,.12);color:#FF3B30}

.range-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.range-btn{padding:7px 16px;border:1px solid #E5E5EA;border-radius:10px;background:#fff;font-size:13px;cursor:pointer;color:#8E8E93;transition:all .15s;font-weight:500}
.range-btn:hover{border-color:#4F8EF7;color:#4F8EF7}
.range-btn.active{background:#4F8EF7;color:#fff;border-color:#4F8EF7;box-shadow:0 2px 8px rgba(79,142,247,.25)}
.range-sep{color:#C7C7CC;margin:0 2px;font-size:13px}
.date-in{padding:6px 10px;border:1px solid #E5E5EA;border-radius:10px;font-size:13px;color:#333;background:#fff;cursor:pointer;width:140px}
.date-in:focus{outline:none;border-color:#4F8EF7;box-shadow:0 0 0 3px rgba(79,142,247,.15)}
.date-label{font-size:13px;color:#8E8E93}

.section{background:#fff;border-radius:16px;padding:22px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px}
.section h2{font-size:17px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #F2F2F7;letter-spacing:.2px}
.chart-box{height:280px;position:relative}
@media(max-width:600px){.chart-box{height:220px}}

.empty{text-align:center;color:#8E8E93;padding:48px 0;font-size:15px}
.empty p{margin-top:8px;font-size:13px}

.md h3{font-size:16px;margin:16px 0 8px;color:#1a1a1a;font-weight:700}
.md p{margin:8px 0;line-height:1.7}
.md ul,.md ol{padding-left:20px;margin:8px 0}.md li{margin:4px 0}
.md table{width:100%;border-collapse:collapse;margin:12px 0;font-size:14px}
.md th,.md td{border:1px solid #E5E5EA;padding:8px 12px}
.md th{background:#F2F2F7;font-weight:600}
.md blockquote{border-left:4px solid #FF3B30;padding:12px 16px;background:rgba(255,59,48,.04);border-radius:0 12px 12px 0;margin:14px 0;font-size:13px;color:#666}

.status-bar{background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:16px;color:#8E8E93;font-size:14px}
.status-bar.err{color:#FF3B30;background:rgba(255,59,48,.04)}

.disclaimer{text-align:center;color:#8E8E93;font-size:12px;padding:20px 0}
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>减脂数据仪表盘</h1>
      <div class="subtitle" id="subtitle"></div>
    </div>
    <select id="sel"><option>加载中...</option></select>
  </header>
  <div id="status"></div>
  <div id="content">
    <div class="cards" id="cards"></div>
    <div id="rangeBar" class="range-bar" style="display:none"></div>
    <div id="charts"></div>
    <div class="section" id="planSec" style="display:none"><div class="md" id="planMd"></div></div>
  </div>
  <div id="empty" class="empty" style="display:none">
    <div>暂无用户档案</div>
    <p>请先使用 /lose-fat 创建健康档案</p>
  </div>
  <div class="disclaimer">⚠️ 免责声明：本方案基于公开医学指南生成，仅供参考，不构成医疗建议。请在医生指导下进行健康管理，如有不适请及时就医。</div>
</div>
<script>
(function(){
  var statusEl=document.getElementById('status');
  var sel=document.getElementById('sel');
  var currentProfile=null;
  var currentRange='all';
  var customStart='';
  var customEnd='';
  var scriptsPending=0;
  var RANGES=[{k:'all',l:'全部'},{k:'3y',l:'三年'},{k:'1y',l:'一年'},{k:'6m',l:'半年'},{k:'3m',l:'三个月'},{k:'1m',l:'一个月'},{k:'1w',l:'一周'}];

  function filterByRange(arr,range){
    if(range==='all'||!arr.length)return arr;
    if(range==='custom'){
      var s=customStart?new Date(customStart):null;
      var e=customEnd?new Date(customEnd+'T23:59:59'):null;
      return arr.filter(function(d){var dt=new Date(d.date);return(!s||dt>=s)&&(!e||dt<=e)});
    }
    var now=new Date(),ms={
      '3y':365.25*3*864e5,'1y':365.25*864e5,'6m':182.625*864e5,
      '3m':91.3125*864e5,'1m':30.4375*864e5,'1w':7*864e5
    };
    var cut=new Date(now.getTime()-(ms[range]||0));
    return arr.filter(function(d){return new Date(d.date)>=cut});
  }

  function renderRangeBar(){
    var bar=document.getElementById('rangeBar');
    bar.style.display='';
    bar.innerHTML='';
    RANGES.forEach(function(r){
      var b=document.createElement('button');
      b.className='range-btn'+(r.k===currentRange?' active':'');
      b.textContent=r.l;
      b.onclick=function(){
        currentRange=r.k;customStart='';customEnd='';
        renderRangeBar();
        if(currentProfile&&typeof Chart!=='undefined'){
          try{renderCharts(currentProfile)}catch(e){console.error('renderCharts:',e)}
        }
      };
      bar.appendChild(b);
    });
    var sep=document.createElement('span');sep.className='range-sep';sep.textContent='|';bar.appendChild(sep);
    var ds=document.createElement('input');ds.type='date';ds.className='date-in';ds.value=customStart;
    ds.onchange=function(){
      customStart=ds.value;
      if(customStart||customEnd){currentRange='custom';renderRangeBar();
        if(currentProfile&&typeof Chart!=='undefined'){try{renderCharts(currentProfile)}catch(e){console.error('renderCharts:',e)}}
      }
    };
    bar.appendChild(ds);
    var lbl=document.createElement('span');lbl.className='date-label';lbl.textContent=' 至 ';bar.appendChild(lbl);
    var de=document.createElement('input');de.type='date';de.className='date-in';de.value=customEnd;
    de.onchange=function(){
      customEnd=de.value;
      if(customStart||customEnd){currentRange='custom';renderRangeBar();
        if(currentProfile&&typeof Chart!=='undefined'){try{renderCharts(currentProfile)}catch(e){console.error('renderCharts:',e)}}
      }
    };
    bar.appendChild(de);
    if(currentRange==='custom'){
      bar.querySelectorAll('.range-btn').forEach(function(b){b.classList.remove('active')});
    }
  }

  window.onerror=function(msg,url,line){
    showStatus('JS Error: '+msg+' (line '+line+')',true);
  };

  function showStatus(msg,isErr){
    if(!msg){statusEl.innerHTML='';return}
    statusEl.innerHTML='<div class="status-bar'+(isErr?' err':'')+'">'+msg+'</div>';
    console.log('[dashboard]',msg);
  }

  function loadScript(url,fallback,name){
    scriptsPending++;
    var s=document.createElement('script');
    s.src=url;
    s.onload=function(){console.log('[dashboard]',name,'loaded');scriptsPending--;onScriptsReady()};
    s.onerror=function(){
      console.log('[dashboard]',name,'failed from',url);
      if(fallback){
        var fb=document.createElement('script');
        fb.src=fallback;
        fb.onload=function(){scriptsPending--;onScriptsReady()};
        fb.onerror=function(){scriptsPending--;onScriptsReady()};
        document.head.appendChild(fb);
      }else{scriptsPending--;onScriptsReady()}
    };
    document.head.appendChild(s);
  }

  function onScriptsReady(){
    if(scriptsPending>0||!currentProfile)return;
    try{renderCharts(currentProfile)}catch(e){console.error('renderCharts:',e)}
    try{renderPlan(currentProfile)}catch(e){console.error('renderPlan:',e)}
  }

  function bmiS(v){return v<18.5?['偏瘦','green','bg']:v<24?['正常','green','bg']:v<28?['超重','amber','ba']:['肥胖','red','br']}
  function tgS(v){return v<1.7?['正常','green','bg']:v<2.3?['边缘升高','amber','ba']:['升高','red','br']}

  function renderCards(p){
    var h=p.health_data||{},b=bmiS(p.bmi),t=tgS(h.tg_mmol);
    var wh=p.weight_history||[],s=wh.length?wh[0].weight_kg:p.weight_kg;
    var d=p.weight_kg-s,dt=d?((d<0?'↓ ':'↑ ')+Math.abs(d).toFixed(1)+' kg'):'起始体重';
    document.getElementById('cards').innerHTML=
      '<div class="card"><div class="label">BMI</div><div class="value '+b[1]+'">'+p.bmi.toFixed(1)+'</div><div class="meta"><span class="badge '+b[2]+'">'+b[0]+'</span></div></div>'+
      '<div class="card"><div class="label">甘油三酯</div><div class="value '+t[1]+'">'+h.tg_mmol+'</div><div class="meta">mmol/L · <span class="badge '+t[2]+'">'+t[0]+'</span></div></div>'+
      '<div class="card"><div class="label">当前体重</div><div class="value">'+p.weight_kg+' kg</div><div class="meta">'+(p.target_weight_kg?'目标 '+p.target_weight_kg+' kg':'')+'</div></div>'+
      '<div class="card"><div class="label">体重变化</div><div class="value '+(d<0?'green':d>0?'red':'')+'">'+dt+'</div><div class="meta">较起始 '+s+' kg</div></div>';
    showStatus('');
  }

  function renderCharts(p){
    if(typeof Chart==='undefined'){
      document.getElementById('charts').innerHTML='<div class="section"><h2>图表</h2><div class="empty"><div>Chart.js 未加载，图表暂不可用</div><p>请检查网络连接后刷新页面</p></div></div>';
      return;
    }
    var area=document.getElementById('charts');area.innerHTML='';
    var wh=filterByRange(p.weight_history||[],currentRange);
    var allTg=filterByRange((p.checkup_history||[]).filter(function(r){return r.tg_mmol!=null}),currentRange);
    var cw=0;

    if(wh.length>=2){
      var s=document.createElement('div');s.className='section';
      s.innerHTML='<h2>体重趋势</h2><div class="chart-box"><canvas id="wc'+cw+'"></canvas></div>';
      area.appendChild(s);
      var ds=[{label:'体重 (kg)',data:wh.map(function(w){return w.weight_kg}),borderColor:'#4F8EF7',backgroundColor:'rgba(79,142,247,.08)',fill:true,tension:.35,pointRadius:5,pointBackgroundColor:'#fff',pointBorderColor:'#4F8EF7',pointBorderWidth:2.5}];
      if(p.target_weight_kg)ds.push({label:'目标',data:wh.map(function(){return p.target_weight_kg}),borderColor:'#34C759',borderDash:[6,4],pointRadius:0,fill:false,borderWidth:1.5});
      new Chart(document.getElementById('wc'+cw),{type:'line',data:{labels:wh.map(function(w){return w.date}),datasets:ds},options:chartOpts()});
      cw++;
    }

    var tg=allTg;
    if(tg.length>=2){
      var s2=document.createElement('div');s2.className='section';
      s2.innerHTML='<h2>甘油三酯趋势</h2><div class="chart-box"><canvas id="wc'+cw+'"></canvas></div>';
      area.appendChild(s2);
      new Chart(document.getElementById('wc'+cw),{type:'line',data:{labels:tg.map(function(r){return r.date}),datasets:[{label:'甘油三酯 (mmol/L)',data:tg.map(function(r){return r.tg_mmol}),borderColor:'#FF3B30',backgroundColor:'rgba(255,59,48,.06)',fill:true,tension:.35,pointRadius:5,pointBackgroundColor:'#fff',pointBorderColor:'#FF3B30',pointBorderWidth:2.5},{label:'正常上限 (1.7)',data:tg.map(function(){return 1.7}),borderColor:'#34C759',borderDash:[6,4],pointRadius:0,fill:false,borderWidth:1.5}]},options:chartOpts()});
      cw++;
    }

    if(!p.weight_history.length&&!p.checkup_history.filter(function(r){return r.tg_mmol!=null}).length){
      area.innerHTML='<div class="section empty"><div>数据不足，至少需要 2 条记录才能生成趋势图</div></div>';
    }
  }

  function chartOpts(){
    return{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{usePointStyle:true,color:'#8E8E93',padding:16}}},scales:{x:{ticks:{color:'#8E8E93'},grid:{display:false}},y:{beginAtZero:false,ticks:{color:'#8E8E93'},grid:{color:'#F2F2F7'}}}};
  }

  function renderPlan(p){
    var sec=document.getElementById('planSec');
    var plan=p.latest_plan;
    if(!plan){sec.style.display='none';return}
    if(typeof marked==='undefined'){
      sec.style.display='';
      document.getElementById('planMd').innerHTML='<p style="color:#8E8E93">Markdown 渲染库未加载，方案内容无法显示</p>';
      return;
    }
    var name=p.name||'';
    var date=p.created_at?p.created_at.slice(0,10):'';
    var fname=name&&date?(name+'_'+date+'_减脂方案.md'):'';
    if(fname){
      fetch('/api/plan?file='+encodeURIComponent(fname),{cache:'no-store'}).then(function(r){
        if(!r.ok)throw new Error('HTTP '+r.status);
        return r.json();
      }).then(function(d){
        if(d.content){
          sec.style.display='';
          document.getElementById('planMd').innerHTML=marked.parse(d.content);
        }else{
          sec.style.display='';
          var html='';
          if(p.latest_assessment)html+='<h3>健康评估</h3>'+marked.parse(p.latest_assessment);
          html+='<h3>减脂计划</h3>'+marked.parse(plan);
          document.getElementById('planMd').innerHTML=html;
        }
      }).catch(function(){
        sec.style.display='';
        var html='';
        if(p.latest_assessment)html+='<h3>健康评估</h3>'+marked.parse(p.latest_assessment);
        html+='<h3>减脂计划</h3>'+marked.parse(plan);
        document.getElementById('planMd').innerHTML=html;
      });
    }else{
      sec.style.display='';
      var html='';
      if(p.latest_assessment)html+='<h3>健康评估</h3>'+marked.parse(p.latest_assessment);
      html+='<h3>减脂计划</h3>'+marked.parse(plan);
      document.getElementById('planMd').innerHTML=html;
    }
  }

  function loadProfile(fn){
    showStatus('加载用户数据...');
    fetch('/api/profile/'+fn,{cache:'no-store'}).then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.json();
    }).then(function(p){
      currentProfile=p;
      currentRange='all';customStart='';customEnd='';
      document.getElementById('content').style.display='';
      document.getElementById('empty').style.display='none';
      document.title='减脂数据 - '+p.name;
      document.getElementById('subtitle').textContent=p.name+' · 健康档案';
      try{renderCards(p)}catch(e){console.error('renderCards:',e)}
      renderRangeBar();
      if(scriptsPending===0){
        try{renderCharts(p)}catch(e){console.error('renderCharts:',e)}
        try{renderPlan(p)}catch(e){console.error('renderPlan:',e)}
      }
    }).catch(function(e){
      showStatus('加载数据失败: '+e.message,true);
      console.error('loadProfile:',e);
    });
  }

  function init(){
    showStatus('加载用户列表...');
    fetch('/api/profiles',{cache:'no-store'}).then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.json();
    }).then(function(list){
      if(!list.length){
        document.getElementById('empty').style.display='';
        sel.style.display='none';
        showStatus('');
        return;
      }
      sel.innerHTML='';
      list.forEach(function(p){
        var o=document.createElement('option');
        o.value=p.filename;
        o.textContent=p.name+(p.date?' ('+p.date+')':'');
        sel.appendChild(o);
      });
      sel.onchange=function(){loadProfile(sel.value)};
      showStatus('');
      loadProfile(sel.value);
    }).catch(function(e){
      showStatus('加载失败: '+e.message,true);
      console.error('init:',e);
      sel.innerHTML='<option>加载失败</option>';
    });
  }

  loadScript('https://cdn.jsdelivr.net/npm/chart.js@4','https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.umd.min.js','Chart.js');
  loadScript('https://cdn.jsdelivr.net/npm/marked/marked.min.js','https://cdn.bootcdn.net/ajax/libs/marked/4.3.0/marked.min.js','marked');
  init();
})();
</script>
</body>
</html>
